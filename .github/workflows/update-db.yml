name: Update AptFinder DB

on:
  schedule:
    - cron: "17 16 * * *"   # 매일 한국시간 새벽 1시 17분

  workflow_dispatch:
    inputs:
      run_mode:
        description: "all, missing"
        required: false
        default: "all"

      max_runtime_minutes:
        description: "GitHub Actions 안전 정지 시간(분)"
        required: false
        default: "330"

permissions:
  contents: write
  actions: read

concurrency:
  group: aptfinder-db-update
  cancel-in-progress: false

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AptFinder DB updater with resume and runtime guard
        env:
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -e

          RUN_MODE="${{ github.event.inputs.run_mode }}"
          MAX_RUNTIME_MINUTES="${{ github.event.inputs.max_runtime_minutes }}"

          if [ -z "$RUN_MODE" ]; then RUN_MODE="all"; fi
          if [ -z "$MAX_RUNTIME_MINUTES" ]; then MAX_RUNTIME_MINUTES="330"; fi

          echo "RUN_MODE=$RUN_MODE"
          echo "MAX_RUNTIME_MINUTES=$MAX_RUNTIME_MINUTES"

          if [ "$RUN_MODE" = "missing" ]; then
            python -u scripts/generate_aptfinder_db.py \
              --region-group missing \
              --resume \
              --force \
              --max-runtime-minutes "$MAX_RUNTIME_MINUTES"
          else
            python -u scripts/generate_aptfinder_db.py \
              --region-group today \
              --resume \
              --force \
              --max-runtime-minutes "$MAX_RUNTIME_MINUTES"
          fi

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aptfinder-generated-files
          path: |
            data/
            metadata.json
            update_state.json
          retention-days: 7

      - name: Commit and push changes
        run: |
          set -e

          git config user.name "aptfinder-bot"
          git config user.email "aptfinder-bot@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git

          BRANCH="${GITHUB_REF_NAME}"
          echo "Current branch: $BRANCH"

          git add data/ metadata.json update_state.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto update AptFinder DB"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            git pull --rebase origin "$BRANCH" || true

            if git push origin HEAD:"$BRANCH"; then
              echo "Push success."
              exit 0
            fi

            echo "Push failed. Retrying in 10 seconds..."
            sleep 10
          done

          echo "Push failed after 3 attempts."
          exit 1
