name: Update AptFinder DB

on:
  schedule:
    - cron: "0 16 * * *"   # 매일 한국시간 새벽 1시
  workflow_dispatch:
    inputs:
      region_group:
        description: "today, 0, 1, 2, 3, 4, 5, missing"
        required: false
        default: "today"
      max_kakao:
        description: "카카오 호출 보호 상한"
        required: false
        default: "7000"
      max_naver:
        description: "네이버 호출 보호 상한"
        required: false
        default: "20000"

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run AptFinder DB updater with resume and quota guard
        env:
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          REGION_GROUP="${{ github.event.inputs.region_group }}"
          MAX_KAKAO="${{ github.event.inputs.max_kakao }}"
          MAX_NAVER="${{ github.event.inputs.max_naver }}"

          if [ -z "$REGION_GROUP" ]; then REGION_GROUP="today"; fi
          if [ -z "$MAX_KAKAO" ]; then MAX_KAKAO="7000"; fi
          if [ -z "$MAX_NAVER" ]; then MAX_NAVER="20000"; fi

          python scripts/generate_aptfinder_db.py \
            --region-group "$REGION_GROUP" \
            --resume \
            --force \
            --skip-web-phone \
            --max-kakao "$MAX_KAKAO" \
            --max-naver "$MAX_NAVER" \
            --max-kapt 50000

      - name: Copy output data to app data path
        run: |
          mkdir -p data
          cp -f output/data/*.json data/

      - name: Commit and push changes
        run: |
          git config user.name "aptfinder-bot"
          git config user.email "aptfinder-bot@users.noreply.github.com"
          git add output/ data/
          git diff --cached --quiet || git commit -m "Auto update AptFinder DB"
          git push
